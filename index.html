<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liderança — Embarque</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
/* LIGHT (default) */
:root{
  --bg:#f2faf5; --surface:#ffffff; --panel:#ffffff; --border:#c6e8d4;
  --accent:#00a843; --accent2:#00c853; --accent-dark:#007a30;
  --green:#00a843; --yellow:#d4900a; --red:#e53935;
  --text:#18291f; --muted:#5a9070; --card:#ffffff;
  --hbg:rgba(242,250,245,.97);
}
/* DARK */
body.dark{
  --bg:#07100d; --surface:#0b1a12; --panel:#0e1f16; --border:#1a3326;
  --accent:#00c853; --accent2:#69f0ae; --accent-dark:#00962e;
  --green:#00e676; --yellow:#ffd740; --red:#ff4d6d;
  --text:#e0f2e9; --muted:#4a7a60; --card:#0c1a11;
  --hbg:rgba(7,16,13,.96);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;transition:background .22s,color .22s;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,168,67,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,168,67,.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
body.dark::before{background-image:linear-gradient(rgba(0,200,83,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,83,.025) 1px,transparent 1px);}

/* HEADER */
header{position:sticky;top:0;z-index:100;background:var(--hbg);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 14px;display:flex;align-items:center;justify-content:space-between;height:54px;gap:10px;}
.logo{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.logo-slot{width:36px;height:36px;border-radius:9px;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo-slot img{width:100%;height:100%;object-fit:contain;}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:21px;letter-spacing:2px;color:var(--text);}
.logo-text span{color:var(--accent);}
.header-right{display:flex;align-items:center;gap:8px;}
.live-badge{display:flex;align-items:center;gap:5px;background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.2);border-radius:20px;padding:4px 10px;font-size:10px;font-weight:700;color:var(--green);letter-spacing:1px;text-transform:uppercase;white-space:nowrap;}
.live-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 1.5s ease infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.6)}}
.clock{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);white-space:nowrap;}
@media(max-width:420px){.clock{display:none;}}

/* MAIN */
main{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:14px 12px;}

/* CAR TABS */
.car-tabs-bar{display:flex;align-items:center;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;-ms-overflow-style:none;scrollbar-width:none;}
.car-tabs-bar::-webkit-scrollbar{display:none;}
.car-tab{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);border-radius:11px;padding:7px 13px;cursor:pointer;transition:all .2s;font-size:13px;font-weight:600;white-space:nowrap;flex-shrink:0;user-select:none;}
.car-tab:hover{border-color:rgba(0,200,83,.35);background:rgba(0,200,83,.04);}
.car-tab.active{background:rgba(0,200,83,.1);border-color:var(--accent);color:var(--accent);}
.tab-frota{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:1px;}
.tab-hour{font-size:11px;color:var(--muted);}
.car-tab.active .tab-hour{color:rgba(0,200,83,.6);}
.tab-badge{background:var(--accent);color:#000;border-radius:20px;padding:1px 7px;font-size:10px;font-weight:800;}
.tab-close{width:16px;height:16px;border-radius:50%;background:rgba(255,77,109,.1);border:1px solid rgba(255,77,109,.2);color:var(--red);font-size:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .18s;flex-shrink:0;}
.tab-close:hover{background:var(--red);color:#fff;border-color:var(--red);}
.btn-add-car{background:rgba(0,200,83,.06);border:1.5px dashed rgba(0,200,83,.35);border-radius:11px;padding:7px 13px;color:var(--accent);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0;}
.btn-add-car:hover{background:rgba(0,200,83,.12);border-style:solid;}

/* STATS STRIP */
.stats-grid{display:flex;gap:8px;margin-bottom:14px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:10px 14px;box-shadow:0 1px 5px rgba(0,0,0,.05);}
body.dark .stats-grid{box-shadow:none;}
@media(max-width:400px){.stats-grid{padding:8px 10px;gap:6px;}}
.stat-card{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;background:transparent;border:none;border-radius:0;padding:0;box-shadow:none;position:relative;overflow:visible;}
body.dark .stat-card{box-shadow:none;}
.stat-card+.stat-card{border-left:1px solid var(--border);padding-left:8px;}
@media(max-width:400px){.stat-card+.stat-card{padding-left:6px;}}
.stat-card:active{transform:none;}
.stat-card::after{display:none;}
.stat-card.sg::after,.stat-card.sg2::after,.stat-card.so::after,.stat-card.sr::after{display:none;}
.stat-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:0;white-space:nowrap;}
.stat-value{font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1;}
.stat-card.sg .stat-value{color:var(--accent);}
.stat-card.sg2 .stat-value{color:var(--accent2);}
.stat-card.so .stat-value{color:#ff9800;}
.stat-card.sr .stat-value{color:var(--red);}
.stat-sub{display:none;}
.pw{display:none;}
.pb{display:none;}

/* LAYOUT */
.columns{display:grid;grid-template-columns:1fr 340px;gap:14px;align-items:start;}
@media(max-width:860px){.columns{grid-template-columns:1fr;}}

/* PANEL */
.panel{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.06);}
body.dark .panel{box-shadow:none;}
.panel-header{padding:13px 15px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.panel-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1.5px;color:var(--text);display:flex;align-items:center;gap:7px;}

/* THEME TOGGLE */
.theme-toggle{width:36px;height:36px;border-radius:9px;border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:all .2s;flex-shrink:0;}
.theme-toggle:hover{border-color:var(--accent);background:rgba(0,168,67,.08);}

/* CONTROLS */
.controls{display:flex;gap:7px;flex-wrap:wrap;align-items:center;flex:1;}
.search-wrap{position:relative;flex:1;min-width:120px;}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:12px;pointer-events:none;}
.search-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 10px 7px 29px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;outline:none;transition:border-color .2s;}
.search-input::placeholder{color:var(--muted);}
.search-input:focus{border-color:var(--accent);}
.filters{display:flex;gap:4px;}
.filter-btn{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:6px 9px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all .18s;white-space:nowrap;}
.filter-btn:hover,.filter-btn.active{background:rgba(0,200,83,.12);border-color:var(--accent);color:var(--accent);}

/* PASSENGER LIST */
.passenger-list{max-height:540px;overflow-y:auto;padding:6px;}
.passenger-list::-webkit-scrollbar{width:3px;}
.passenger-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
.passenger-item{display:flex;align-items:center;gap:10px;padding:10px 11px;border-radius:11px;margin-bottom:4px;border:1px solid transparent;animation:slideIn .25s ease both;transition:background .15s,border-color .15s;}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.passenger-item:hover{background:rgba(255,255,255,.03);border-color:var(--border);}
.passenger-item.boarded{background:rgba(0,200,83,.07);border-color:rgba(0,200,83,.2);}
.passenger-item.absent{opacity:.5;background:rgba(255,77,109,.04);border-color:rgba(255,77,109,.12);}
.seat-badge{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:800;flex-shrink:0;background:var(--surface);border:1px solid var(--border);color:var(--muted);transition:all .25s;}
.passenger-item.boarded .seat-badge{background:rgba(0,200,83,.14);border-color:var(--accent);color:var(--accent);}
.passenger-item.absent  .seat-badge{background:rgba(255,77,109,.1);border-color:var(--red);color:var(--red);}
.passenger-info{flex:1;min-width:0;}
.passenger-main{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.passenger-seat-lbl{font-size:13px;font-weight:700;color:var(--text);}
.passenger-detail{font-size:11px;color:var(--muted);margin-top:2px;display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
.tag{display:inline-flex;align-items:center;gap:3px;border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700;letter-spacing:.3px;}
.tag.leito{color:var(--yellow);background:rgba(255,215,64,.1);}
.tag.comum{color:var(--muted);background:rgba(255,255,255,.05);}
.tag.ph{color:#80cbc4;background:rgba(128,203,196,.12);}
.tag.keila{color:#ce93d8;background:rgba(206,147,216,.12);}
.board-time{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent);}
.absent-lbl{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--red);}
.passenger-actions{display:flex;gap:5px;flex-shrink:0;}
.btn-board,.btn-absent,.btn-undo{padding:7px 12px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .18s;border:1px solid;white-space:nowrap;touch-action:manipulation;}
.btn-board{background:rgba(0,200,83,.1);border-color:rgba(0,200,83,.3);color:var(--accent);}
.btn-board:hover,.btn-board:active{background:var(--accent);color:#000;box-shadow:0 0 12px rgba(0,200,83,.4);}
.btn-absent{background:rgba(255,77,109,.08);border-color:rgba(255,77,109,.25);color:var(--red);}
.btn-absent:hover,.btn-absent:active{background:var(--red);color:#fff;}
.btn-undo{background:rgba(255,255,255,.05);border-color:var(--border);color:var(--muted);}
.btn-undo:hover,.btn-undo:active{background:rgba(255,255,255,.1);color:var(--text);}

/* ADD FORM */
.add-panel{padding:14px;}
.add-form{display:flex;flex-direction:column;gap:10px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:700;}
.form-input,.form-select{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:9px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .2s,box-shadow .2s;width:100%;-webkit-appearance:none;}
.form-input::placeholder{color:var(--muted);}
.form-input:focus,.form-select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,200,83,.1);}
.form-select option{background:var(--surface);color:var(--text);}

/* AGENCY BUTTONS */
.agency-row{display:flex;gap:8px;}
.agency-btn{flex:1;padding:9px 8px;border-radius:9px;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .18s;text-align:center;touch-action:manipulation;}
.agency-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(0,168,67,.06);}
.agency-btn.sel-ph{border-color:#80cbc4;background:rgba(128,203,196,.1);color:#80cbc4;}
.agency-btn.sel-keila{border-color:#ce93d8;background:rgba(206,147,216,.1);color:#ce93d8;}
.agency-btn.sel-comum{border-color:var(--accent);background:rgba(0,168,67,.1);color:var(--accent);}
.agency-btn.sel-leito{border-color:var(--yellow);background:rgba(212,144,10,.1);color:var(--yellow);}

/* COLO checkbox inline */
.colo-row{display:flex;align-items:center;gap:7px;margin-top:4px;cursor:pointer;user-select:none;}
.colo-check{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .18s;flex-shrink:0;}
.colo-check.checked{border-color:var(--yellow);background:rgba(212,144,10,.12);color:var(--yellow);}
.colo-label{font-size:11px;color:var(--muted);}

.btn-add{background:linear-gradient(135deg,var(--accent),var(--accent-dark));border:none;border-radius:10px;padding:12px;color:#000;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:all .2s;letter-spacing:.5px;touch-action:manipulation;}
.btn-add:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,200,83,.4);}
.btn-add:active{transform:scale(.97);}

/* FLEET INFO */
.fleet-info-bar{padding:11px 14px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;border-bottom:1px solid var(--border);background:rgba(0,200,83,.03);}
.fi-item{display:flex;flex-direction:column;gap:2px;}
.fi-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.fi-value{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;color:var(--accent);}

/* FINALIZE */
.btn-finalize{background:linear-gradient(135deg,#ff6b35,#ff4d6d);border:none;border-radius:9px;padding:8px 13px;color:#fff;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:800;cursor:pointer;transition:all .2s;letter-spacing:.3px;white-space:nowrap;touch-action:manipulation;}
.btn-finalize:hover{box-shadow:0 5px 16px rgba(255,77,109,.4);transform:translateY(-1px);}
.btn-finalize:active{transform:scale(.97);}

/* EMPTY STATE */
.empty-state{text-align:center;padding:38px 16px;color:var(--muted);}
.empty-state .ei{font-size:34px;margin-bottom:8px;opacity:.6;}
.empty-state p{font-size:12px;line-height:1.6;}
.empty-state strong{color:var(--accent);}

/* TOAST */
.toast-container{position:fixed;bottom:18px;right:14px;z-index:9999;display:flex;flex-direction:column;gap:7px;pointer-events:none;}
.toast{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:10px 13px;font-size:12px;display:flex;align-items:center;gap:8px;animation:toastIn .28s cubic-bezier(.34,1.56,.64,1) both;box-shadow:0 6px 24px rgba(0,0,0,.13);min-width:200px;max-width:280px;pointer-events:auto;}
@keyframes toastIn{from{opacity:0;transform:translateX(28px) scale(.9)}to{opacity:1;transform:translateX(0) scale(1)}}
.toast.out{animation:toastOut .2s ease forwards;}
@keyframes toastOut{to{opacity:0;transform:translateX(28px) scale(.95)}}
.toast-icon{font-size:16px;}
.toast-text strong{display:block;font-weight:700;font-size:12px;}
.toast-text small{color:var(--muted);font-size:10px;}
.toast.green{border-color:rgba(0,200,83,.35);}
.toast.red{border-color:rgba(255,77,109,.35);}
.toast.blue{border-color:rgba(0,200,83,.3);}

/* HISTORY */
#historySection{position:relative;z-index:1;border-top:1px solid var(--border);margin-top:26px;padding:18px 12px 36px;}
.history-inner{max-width:1400px;margin:0 auto;}
.history-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px;}
.history-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--muted);}
.hc-clickable{cursor:pointer;user-select:none;transition:background .15s;}
.hc-clickable:hover{background:rgba(0,200,83,.04);}
.hc-arrow{font-size:10px;color:var(--muted);flex-shrink:0;transition:transform .2s;}
.hc-body{padding-top:10px;}

.btn-clear-history{background:rgba(255,77,109,.08);border:1px solid rgba(255,77,109,.2);border-radius:8px;padding:5px 12px;color:var(--red);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .18s;}
.btn-clear-history:hover{background:rgba(255,77,109,.16);}
.history-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px;}
.history-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 15px;animation:slideIn .3s ease both;position:relative;overflow:hidden;box-shadow:0 1px 5px rgba(0,0,0,.05);}
body.dark .history-card{box-shadow:none;}
.history-card::before{content:'';position:absolute;top:0;left:0;width:100%;height:3px;background:linear-gradient(90deg,var(--accent),transparent);}
.history-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:8px;}
.hc-frota{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--accent);}
.hc-id{font-size:10px;color:var(--muted);margin-top:1px;}
.hc-dt{font-family:'JetBrains Mono',monospace;text-align:right;}
.hc-dt .hdate{display:block;font-size:12px;font-weight:700;color:var(--text);}
.hc-dt .htime{display:block;color:var(--muted);font-size:10px;}
.history-stats-row{display:flex;gap:7px;margin-bottom:10px;}
.hstat{display:flex;flex-direction:column;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:5px 8px;flex:1;}
.hstat .hval{font-family:'Bebas Neue',sans-serif;font-size:19px;line-height:1;}
.hstat .hlbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-top:1px;}
.hstat.ht .hval{color:var(--accent);}
.hstat.hb .hval{color:var(--green);}
.hstat.ha .hval{color:var(--red);}
.history-pass-list{max-height:100px;overflow-y:auto;display:flex;flex-direction:column;gap:3px;}
.history-pass-list::-webkit-scrollbar{width:3px;}
.history-pass-list::-webkit-scrollbar-thumb{background:var(--border);}
.hpass-item{display:flex;align-items:center;gap:6px;font-size:11px;padding:3px 5px;border-radius:5px;background:rgba(255,255,255,.02);}
.hpass-seat{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);min-width:26px;}
.hpass-info{flex:1;display:flex;gap:4px;align-items:center;}
.btn-share{width:100%;margin-top:10px;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:6px;}
.btn-share:hover{border-color:var(--accent);color:var(--accent);background:rgba(0,168,67,.06);}

.btn-collapse{background:rgba(255,77,109,.07);border:1px solid rgba(255,77,109,.2);border-radius:8px;padding:5px 11px;color:var(--red);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .18s;white-space:nowrap;flex-shrink:0;}
.btn-collapse:hover{background:rgba(255,77,109,.15);}
.btn-reopen{display:none;position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:9998;padding:12px 28px;border-radius:24px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent-dark));color:#000;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:800;cursor:pointer;box-shadow:0 4px 20px rgba(0,200,83,.4);white-space:nowrap;transition:all .2s;}
.btn-reopen:hover{transform:translateX(-50%) translateY(-2px);box-shadow:0 8px 28px rgba(0,200,83,.5);}
.columns.sidebar-hidden{grid-template-columns:1fr!important;}
.btn-remove{padding:6px 9px;border-radius:7px;background:rgba(255,77,109,.07);border:1px solid rgba(255,77,109,.2);color:var(--red);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .18s;white-space:nowrap;}
.btn-remove:hover,.btn-remove:active{background:var(--red);color:#fff;}
.outra-cidade-toggle{display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none;margin-top:2px;}
.oc-check{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .18s;flex-shrink:0;}
.oc-check.checked{border-color:#f59e0b;background:rgba(245,158,11,.12);}
.oc-label{font-size:11px;color:var(--muted);}
.oc-city-input{width:100%;margin-top:6px;background:var(--surface);border:1px solid #f59e0b;border-radius:8px;padding:7px 10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;outline:none;}
.oc-city-input::placeholder{color:var(--muted);}

/* BLINKING badge */
.blink-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.4);border-radius:6px;padding:2px 7px;font-size:10px;font-weight:700;color:#f59e0b;white-space:nowrap;}
.blink-dot{width:6px;height:6px;background:#f59e0b;border-radius:50%;animation:blinkDot 1.1s ease infinite;}
@keyframes blinkDot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.2;transform:scale(.6)}}
.shared-view{max-width:480px;margin:0 auto;padding:24px 16px;}
.shared-header{text-align:center;margin-bottom:20px;}
.shared-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(0,168,67,.1);border:1px solid rgba(0,168,67,.3);border-radius:20px;padding:5px 14px;font-size:11px;font-weight:700;color:var(--accent);letter-spacing:1px;text-transform:uppercase;margin-bottom:14px;}
.shared-frota{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px;color:var(--text);}
.shared-meta{font-size:12px;color:var(--muted);margin-top:4px;}
.shared-stats{display:flex;gap:10px;margin-bottom:18px;}
.shared-stat{flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 8px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06);}
body.dark .shared-stat{box-shadow:none;}
.shared-stat .sv{font-family:'Bebas Neue',sans-serif;font-size:28px;line-height:1;}
.shared-stat .sl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-top:2px;}
.shared-stat.sb .sv{color:var(--accent);}
.shared-stat.se .sv{color:var(--green);}
.shared-stat.sa .sv{color:var(--red);}
.shared-stat.sc .sv{color:var(--yellow);}
.shared-list{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:0 1px 5px rgba(0,0,0,.05);}
body.dark .shared-list{box-shadow:none;}
.shared-list-header{padding:11px 14px;border-bottom:1px solid var(--border);font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1.5px;color:var(--muted);}
.shared-pass-item{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border);}
.shared-pass-item:last-child{border-bottom:none;}
.shared-pass-item.boarded{background:rgba(0,200,83,.04);}
.shared-pass-item.absent{opacity:.5;}
.spi-seat{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:800;min-width:30px;color:var(--muted);}
.shared-pass-item.boarded .spi-seat{color:var(--accent);}
.shared-pass-item.absent .spi-seat{color:var(--red);}
.spi-tags{flex:1;display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
.spi-status{font-size:15px;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(7px);z-index:9000;display:flex;align-items:center;justify-content:center;padding:14px;animation:mfade .18s ease;}
@keyframes mfade{from{opacity:0}to{opacity:1}}
.modal-box{background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:24px 20px;max-width:380px;width:100%;text-align:center;animation:popIn .27s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{from{opacity:0;transform:scale(.84)}to{opacity:1;transform:scale(1)}}
.modal-icon{font-size:36px;margin-bottom:8px;}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:21px;letter-spacing:2px;margin-bottom:6px;}
.modal-desc{font-size:12px;color:var(--muted);margin-bottom:16px;line-height:1.6;}
.modal-summary{display:flex;justify-content:center;gap:14px;margin-bottom:16px;}
.msumm{display:flex;flex-direction:column;align-items:center;gap:2px;}
.msumm .mv{font-family:'Bebas Neue',sans-serif;font-size:28px;line-height:1;}
.msumm .ml{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.msumm.mb .mv{color:var(--green);}
.msumm.ma .mv{color:var(--red);}
.msumm.mw .mv{color:var(--yellow);}
.modal-btns{display:flex;gap:10px;}
.mbtn-cancel{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;}
.mbtn-cancel:hover{color:var(--text);border-color:var(--muted);}
.mbtn-confirm{flex:1;background:linear-gradient(135deg,#ff6b35,#ff4d6d);border:none;border-radius:10px;padding:10px;color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:all .2s;}
.mbtn-confirm:hover{box-shadow:0 5px 16px rgba(255,77,109,.4);transform:translateY(-1px);}
.mbtn-confirm-green{flex:1;background:linear-gradient(135deg,var(--accent),var(--accent-dark));border:none;border-radius:10px;padding:10px;color:#000;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:all .2s;}
.mbtn-confirm-green:hover{box-shadow:0 5px 16px rgba(0,200,83,.4);transform:translateY(-1px);}
.modal-form{display:flex;flex-direction:column;gap:10px;text-align:left;margin-bottom:16px;}
.time-presets{display:flex;flex-wrap:wrap;gap:7px;}
.time-preset-btn{flex:1;min-width:calc(33% - 5px);padding:9px 6px;border-radius:9px;border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;cursor:pointer;transition:all .18s;text-align:center;touch-action:manipulation;}
.time-preset-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(0,168,67,.06);}
.time-preset-btn.sel{border-color:var(--accent);background:rgba(0,168,67,.13);color:var(--accent);}
.time-custom-wrap{display:flex;align-items:center;gap:8px;}
.time-custom-wrap .form-input{flex:1;}
.btn-custom-time{padding:9px 12px;border-radius:9px;border:1.5px dashed var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .18s;white-space:nowrap;flex-shrink:0;}
.btn-custom-time:hover{border-color:var(--accent);color:var(--accent);}

/* PDF IMPORT */
.btn-import-pdf{background:rgba(0,200,83,.07);border:1px solid rgba(0,200,83,.25);border-radius:8px;padding:5px 11px;color:var(--accent);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .18s;white-space:nowrap;}
.btn-import-pdf:hover{background:rgba(0,200,83,.14);border-color:var(--accent);}
.btn-import-pdf:disabled{opacity:.5;cursor:wait;}
.import-preview-list{max-height:260px;overflow-y:auto;display:flex;flex-direction:column;gap:5px;margin-bottom:16px;text-align:left;}
.import-preview-list::-webkit-scrollbar{width:3px;}
.import-preview-list::-webkit-scrollbar-thumb{background:var(--border);}
.import-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:9px;background:var(--surface);border:1px solid var(--border);}
.import-row.skip{opacity:.4;}
.import-seat{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:800;min-width:28px;color:var(--accent);}
.import-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;flex-shrink:0;}


.fade-in{animation:fadeUp .38s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.ripple{position:absolute;border-radius:50%;background:rgba(0,200,83,.2);transform:scale(0);animation:rippleA .5s linear;pointer-events:none;}
@keyframes rippleA{to{transform:scale(4);opacity:0}}

@media(max-width:480px){
  .passenger-item{flex-wrap:wrap;}
  .passenger-actions{width:100%;display:flex;flex-direction:row;}
  .btn-board,.btn-absent,.btn-undo{flex:1;text-align:center;padding:8px 4px;font-size:11px;}
  .toast-container{bottom:10px;right:10px;left:10px;}
  .toast{min-width:unset;width:100%;}
  .modal-box{padding:20px 14px;}
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-slot">
      <img src="logo.png" alt="Logo" id="logoImg" onerror="this.style.display='none'">
    </div>
    <div class="logo-text"><span>Liderança</span></div>
  </div>
  <div class="header-right">
    <div class="live-badge"><div class="live-dot"></div>Ao Vivo</div>
    <div class="clock" id="clock">--:--:--</div>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Alternar tema">☀️</button>
  </div>
</header>

<main>
  <!-- TABS -->
  <div class="car-tabs-bar fade-in" id="carTabsBar">
    <button class="btn-add-car" onclick="openNewCarModal()">＋ Novo Carro</button>
  </div>

  <!-- STATS -->
  <div class="stats-grid fade-in" style="animation-delay:.06s">
    <div class="stat-card sg">
      <div class="stat-label">Total</div>
      <div class="stat-value" id="statTotal">0</div>
      <div class="stat-sub">passageiros</div>
      <div class="pw"><div class="pb" id="barTotal" style="width:0%"></div></div>
    </div>
    <div class="stat-card sg2">
      <div class="stat-label">Embarcados</div>
      <div class="stat-value" id="statBoarded">0</div>
      <div class="stat-sub" id="boardedPct">0%</div>
      <div class="pw"><div class="pb" id="barBoarded" style="width:0%"></div></div>
    </div>
    <div class="stat-card so">
      <div class="stat-label">Aguardando</div>
      <div class="stat-value" id="statWaiting">0</div>
      <div class="stat-sub">pendentes</div>
    </div>
    <div class="stat-card sr">
      <div class="stat-label">Ausentes</div>
      <div class="stat-value" id="statAbsent">0</div>
      <div class="stat-sub">não vieram</div>
    </div>
  </div>

  <div class="columns" id="mainColumns">
    <!-- LIST -->
    <div class="panel fade-in" style="animation-delay:.1s">
      <div class="panel-header">
        <div class="panel-title">🎟 <span id="listTitle">Passageiros</span></div>
        <div class="controls">
          <div class="filters">
            <button class="filter-btn" data-filter="all">Todos</button>
            <button class="filter-btn active" data-filter="waiting">⏳</button>
            <button class="filter-btn" data-filter="boarded">✅</button>
            <button class="filter-btn" data-filter="absent">❌</button>
          </div>
          <button class="btn-collapse" id="btnCollapse" onclick="toggleSidebar()" title="Fechar painel">✕</button>
        </div>
      </div>
      <div class="passenger-list" id="passengerList"></div>
    </div>

    <!-- SIDEBAR -->
    <div id="sidebar" style="display:flex;flex-direction:column;gap:13px;">

      <!-- FLEET + FINALIZE -->
      <div class="panel fade-in" style="animation-delay:.13s">
        <div class="panel-header">
          <div class="panel-title">🚌 Carro Ativo</div>
          <button class="btn-finalize" onclick="finalizeBoarding()">🏁 Finalizar</button>
        </div>
        <div class="fleet-info-bar">
          <div class="fi-item"><div class="fi-label">Frota</div><div class="fi-value" id="infoFrota">—</div></div>
          <div class="fi-item"><div class="fi-label">Horário</div><div class="fi-value" id="infoHorario">—</div></div>
        </div>
      </div>

      <!-- ADD PASSENGER -->
      <div class="panel fade-in" style="animation-delay:.16s" id="addPanel">
        <div class="panel-header">
          <div class="panel-title">➕ Adicionar Passageiro</div>
          <button class="btn-import-pdf" id="btnImportPDF" onclick="triggerPDFImport()" title="Importar lista do PDF">📄 Importar PDF</button>
          <input type="file" id="pdfFileInput" accept=".pdf" style="display:none" onchange="handlePDFImport(event)">
        </div>
        <div id="addPanelBody">
        <div class="add-panel">
          <div class="add-form">
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Nº Poltrona</label>
                <input type="number" min="1" max="99" class="form-input" id="inputSeat" placeholder="Ex: 12" inputmode="numeric">
              </div>
              <div class="form-group">
                <label class="form-label">Categoria</label>
                <div class="agency-row">
                  <button type="button" class="agency-btn sel-comum" id="btnComum" onclick="selectCat('')">Comum</button>
                  <button type="button" class="agency-btn" id="btnLeito" onclick="selectCat('leito')">Leito</button>
                </div>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Agência</label>
              <div class="agency-row">
                <button type="button" class="agency-btn" id="btnPH"    onclick="selectAgency('PH')">🏢 PH</button>
                <button type="button" class="agency-btn" id="btnKEILA" onclick="selectAgency('KEILA')">🏢 KEILA</button>
              </div>
            </div>
            <div class="form-group">
              <div class="outra-cidade-toggle" onclick="toggleOutraCidade()">
                <div class="oc-check" id="ocCheck"></div>
                <span class="oc-label">Embarca em outra cidade</span>
              </div>
            </div>
            <button class="btn-add" onclick="addPassenger()">＋ ADICIONAR</button>
          </div>
        </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Floating reopen button is rendered outside main below -->

</main>

<!-- Floating reopen button - outside main to avoid stacking context issues -->
<button class="btn-reopen" id="btnReopen" onclick="toggleSidebar()">➕ Adicionar Passageiro</button>

<!-- HISTORY -->
<section id="historySection" style="display:none">
  <div class="history-inner">
    <div class="history-header">
      <div class="history-title">📁 Histórico de Embarques</div>
      <button class="btn-clear-history" onclick="clearHistory()">🗑 Limpar</button>
    </div>
    <div id="historyList"></div>
  </div>
</section>

<div class="toast-container" id="toastContainer"></div>

<script>
const HISTORY_KEY='lideranca_history_v4';
const CARS_KEY='lideranca_cars_v4';

let cars=[],activeCar=null,nextPassId=1,nextCarId=1;
let currentFilter='waiting',searchTerm='',selectedAgency='';

// AGENCY — default KEILA
function selectAgency(ag){
  selectedAgency=ag;
  document.getElementById('btnPH').className='agency-btn'+(ag==='PH'?' sel-ph':'');
  document.getElementById('btnKEILA').className='agency-btn'+(ag==='KEILA'?' sel-keila':'');
}

// CATEGORY
let selectedCat='';
function selectCat(cat){
  selectedCat=cat;
  document.getElementById('btnComum').className='agency-btn'+(cat===''?' sel-comum':'');
  document.getElementById('btnLeito').className='agency-btn'+(cat==='leito'?' sel-leito':'');
}

// PERSIST
function saveCars(){try{localStorage.setItem(CARS_KEY,JSON.stringify({cars,activeCar,nextPassId,nextCarId}));}catch{}}
function loadCarsData(){
  try{
    const d=JSON.parse(localStorage.getItem(CARS_KEY));
    if(d&&d.cars&&d.cars.length){cars=d.cars;activeCar=d.activeCar;nextPassId=d.nextPassId||1;nextCarId=d.nextCarId||1;return true;}
  }catch{}
  return false;
}

// CLOCK
function updateClock(){document.getElementById('clock').textContent=new Date().toLocaleTimeString('pt-BR');}
setInterval(updateClock,1000);updateClock();

// HELPERS
function getActiveCar(){return cars.find(c=>c.id===activeCar)||null;}
function parseSeat(s){const n=parseInt(s);return isNaN(n)?9999:n;}

// TABS
function renderTabs(){
  const bar=document.getElementById('carTabsBar');
  const addBtn=bar.querySelector('.btn-add-car');
  bar.querySelectorAll('.car-tab').forEach(t=>t.remove());
  cars.forEach(car=>{
    const boarded=car.passengers.filter(p=>p.status==='boarded').length;
    const tab=document.createElement('div');
    tab.className='car-tab'+(car.id===activeCar?' active':'');
    tab.innerHTML=`<span class="tab-frota">${car.frota}</span><span class="tab-hour">${car.horario}</span>${boarded>0?`<span class="tab-badge">${boarded}</span>`:''}<span class="tab-close" onclick="removeCar(${car.id},event)">✕</span>`;
    tab.addEventListener('click',()=>switchCar(car.id));
    bar.insertBefore(tab,addBtn);
  });
}

function switchCar(id){
  activeCar=id;currentFilter='waiting';searchTerm='';
  document.getElementById('searchInput').value='';
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.filter-btn[data-filter="waiting"]').classList.add('active');
  saveCars();refresh();
}

function removeCar(id,e){
  e.stopPropagation();
  const car=cars.find(c=>c.id===id);
  if(!confirm(`Remover frota ${car?.frota||id}?`))return;
  cars=cars.filter(c=>c.id!==id);
  if(activeCar===id)activeCar=cars.length?cars[0].id:null;
  saveCars();refresh();
}

// NEW CAR
function openNewCarModal(){
  const ov=document.createElement('div');ov.className='modal-overlay';
  ov.innerHTML=`<div class="modal-box">
    <div class="modal-icon">🚌</div>
    <div class="modal-title">Novo Carro</div>
    <div class="modal-desc">Selecione o horário para iniciar o embarque.</div>
    <div class="modal-form">
      <div class="form-group">
        <label class="form-label">Horário de Partida</label>
        <div class="time-presets" id="timePresets">
          <button type="button" class="time-preset-btn" onclick="selectTime(this,'05:30')">05:30</button>
          <button type="button" class="time-preset-btn" onclick="selectTime(this,'08:30')">08:30</button>
          <button type="button" class="time-preset-btn" onclick="selectTime(this,'10:00')">10:00</button>
          <button type="button" class="time-preset-btn" onclick="selectTime(this,'13:10')">13:10</button>
          <button type="button" class="time-preset-btn" onclick="selectTime(this,'19:40')">19:40</button>
          <button type="button" class="btn-custom-time" onclick="toggleCustomTime(this)">+ Outro</button>
        </div>
        <div class="time-custom-wrap" id="customTimeWrap" style="display:none;margin-top:8px;">
          <input type="time" class="form-input" id="newHorario" placeholder="Horário extra">
          <span style="font-size:11px;color:var(--muted);white-space:nowrap;">horário extra</span>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Número da Frota <span style="color:var(--muted);font-weight:400">(opcional)</span></label>
        <input type="text" class="form-input" id="newFrota" placeholder="Ex: 4507" autocomplete="off">
      </div>
    </div>
    <div class="modal-btns">
      <button class="mbtn-cancel" onclick="this.closest('.modal-overlay').remove()">Cancelar</button>
      <button class="mbtn-confirm-green" onclick="confirmNewCar(this)">✔ Adicionar</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  ov.addEventListener('click',e=>{if(e.target===ov)ov.remove();});
}

function selectTime(btn, time){
  document.querySelectorAll('.time-preset-btn').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  btn.dataset.value=time;
  // hide custom input when a preset is selected
  const wrap=document.getElementById('customTimeWrap');
  if(wrap) wrap.style.display='none';
}

function toggleCustomTime(btn){
  const wrap=document.getElementById('customTimeWrap');
  const isVisible=wrap.style.display!=='none';
  wrap.style.display=isVisible?'none':'flex';
  if(!isVisible){
    // deselect presets
    document.querySelectorAll('.time-preset-btn').forEach(b=>b.classList.remove('sel'));
    setTimeout(()=>document.getElementById('newHorario').focus(),80);
  }
}

function confirmNewCar(btn){
  const frota=document.getElementById('newFrota').value.trim();
  // get selected time: preset first, then custom input
  const selPreset=document.querySelector('.time-preset-btn.sel');
  const customWrap=document.getElementById('customTimeWrap');
  const customInput=document.getElementById('newHorario');
  let horario='';
  if(selPreset){
    horario=selPreset.dataset.value||selPreset.textContent.trim();
  } else if(customWrap&&customWrap.style.display!=='none'&&customInput&&customInput.value){
    // format HH:MM from time input
    horario=customInput.value;
  }
  if(!horario){showToast('red','⚠️','Horário obrigatório','Selecione ou informe um horário');return;}
  const car={id:nextCarId++,frota:frota||'—',horario,passengers:[]};
  cars.push(car);activeCar=car.id;
  btn.closest('.modal-overlay').remove();
  saveCars();refresh();
  showToast('blue','🚌',frota?`Frota ${frota}`:'Novo carro',`Adicionado · ${car.horario}`);
}

// STATS
function updateStats(){
  const car=getActiveCar();const ps=car?car.passengers:[];
  const total=ps.length,boarded=ps.filter(p=>p.status==='boarded').length;
  const waiting=ps.filter(p=>p.status==='waiting').length,absent=ps.filter(p=>p.status==='absent').length;
  const pct=total>0?Math.round(boarded/total*100):0;
  document.getElementById('statTotal').textContent=total;
  document.getElementById('statBoarded').textContent=boarded;
  document.getElementById('statWaiting').textContent=waiting;
  document.getElementById('statAbsent').textContent=absent;
  document.getElementById('boardedPct').textContent=pct+'%';
  document.getElementById('barTotal').style.width=Math.min(total/44*100,100)+'%';
  document.getElementById('barBoarded').style.width=pct+'%';
  document.getElementById('infoFrota').textContent=car?car.frota:'—';
  document.getElementById('infoHorario').textContent=car?car.horario:'—';
  document.getElementById('listTitle').textContent=car?`Frota ${car.frota}`:'Passageiros';
}

// RENDER LIST
function renderList(){
  const list=document.getElementById('passengerList');
  const car=getActiveCar();
  if(!car){
    list.innerHTML=`<div class="empty-state"><div class="ei">🚌</div><p>Nenhum carro selecionado.<br>Clique em <strong>＋ Novo Carro</strong> para começar.</p></div>`;
    return;
  }
  let sorted=[...car.passengers].sort((a,b)=>parseSeat(a.seat)-parseSeat(b.seat));
  let filtered=sorted.filter(p=>{
    if(currentFilter!=='all'&&p.status!==currentFilter)return false;
    if(searchTerm)return String(p.seat).includes(searchTerm);
    return true;
  });
  if(!filtered.length){
    list.innerHTML=`<div class="empty-state"><div class="ei">🔍</div><p>Nenhum resultado.</p></div>`;
    return;
  }
  list.innerHTML='';
  filtered.forEach((p,idx)=>{
    const el=document.createElement('div');
    el.className=`passenger-item ${p.status}`;
    el.style.animationDelay=`${idx*0.03}s`;
    const catTag=p.cat==='leito'?'<span class="tag leito">🛏 Leito</span>':'<span class="tag comum">🪑 Comum</span>';
    const agTag=p.agency==='PH'?'<span class="tag ph">PH</span>':p.agency==='KEILA'?'<span class="tag keila">KEILA</span>':'';
    const coloCount=p.colo||0;
    const coloTag=coloCount>0?`<span class="tag" style="color:var(--yellow);background:rgba(212,144,10,.1)">👶 ${coloCount} colo</span>`:'';
    const cidadeTag=p.cidade?`<div style="margin-top:4px"><span class="blink-badge"><span class="blink-dot"></span>Embarca em ${p.cidade}</span></div>`:'';
    const statusInfo=p.status==='boarded'&&p.time?`<div class="board-time">✅ ${p.time}</div>`:p.status==='absent'?`<div class="absent-lbl">❌ Ausente</div>`:'';
    const actions=p.status==='waiting'
      ?`<button class="btn-board"  onclick="boardPassenger(${p.id},event)">✔ Embarcar</button><button class="btn-absent" onclick="markAbsent(${p.id},event)">✗ Ausente</button><button class="btn-remove" onclick="removePassenger(${p.id})" title="Remover">🗑</button>`
      :`<button class="btn-undo" onclick="undoStatus(${p.id},event)">↩ Desfazer</button><button class="btn-remove" onclick="removePassenger(${p.id})" title="Remover">🗑</button>`;
    el.innerHTML=`
      <div class="seat-badge">${p.seat}</div>
      <div class="passenger-info">
        <div class="passenger-main"><span class="passenger-seat-lbl">${p.name?p.name:`Poltrona ${p.seat}`}</span>${catTag}${agTag}${coloTag}</div>
        ${p.name?`<div style="font-size:10px;color:var(--muted);margin-top:1px">Poltrona ${p.seat}</div>`:''}
        ${cidadeTag}
        <div class="colo-row" onclick="toggleColo(${p.id})">
          <div class="colo-check ${coloCount>0?'checked':''}">👶</div>
          <span class="colo-label">${coloCount>0?`${coloCount} criança de colo`:'Adicionar criança de colo'}</span>
        </div>
        ${statusInfo}
      </div>
      <div class="passenger-actions">${actions}</div>`;
    list.appendChild(el);
  });
}

// RIPPLE
function rippleEffect(e){
  if(!e||!e.currentTarget)return;
  const btn=e.currentTarget;const r=document.createElement('span');r.className='ripple';
  const rect=btn.getBoundingClientRect();const size=Math.max(rect.width,rect.height);
  r.style.width=r.style.height=size+'px';
  r.style.left=(e.clientX-rect.left-size/2)+'px';
  r.style.top=(e.clientY-rect.top-size/2)+'px';
  btn.style.position='relative';btn.appendChild(r);
  setTimeout(()=>r.remove(),500);
}

// ===== SHARE — URL compacta, sem serviço externo =====
function encodeEntry(entry){
  const catC=c=>c==='leito'?'l':'c';
  const agC=a=>a==='PH'?'p':'k';
  const stC=s=>s==='boarded'?'b':s==='absent'?'a':'w';
  const header=[entry.frota,entry.horario,entry.date,entry.time,entry.boarded,entry.absent,entry.totalColo||0].join('|');
  const ps=entry.passengers.map(p=>[p.seat,catC(p.cat),agC(p.agency),p.colo||0,stC(p.status),encodeURIComponent(p.cidade||'')].join(',')).join('~');
  return btoa(unescape(encodeURIComponent(header+'§'+ps)));
}
function decodeEntry(encoded){
  const raw=decodeURIComponent(escape(atob(encoded)));
  const [header,ps]=raw.split('§');
  const [frota,horario,date,time,boarded,absent,totalColo]=header.split('|');
  const passengers=ps?ps.split('~').map(p=>{
    const [seat,cat,ag,colo,st,cid]=p.split(',');
    return{seat:isNaN(seat)?seat:Number(seat),cat:cat==='l'?'leito':'',agency:ag==='p'?'PH':'KEILA',colo:Number(colo)||0,status:st==='b'?'boarded':st==='a'?'absent':'waiting',cidade:decodeURIComponent(cid||'')};
  }):[];
  return{frota,horario,date,time,boarded:Number(boarded),absent:Number(absent),totalColo:Number(totalColo),passengers};
}
function shareEntry(entry){
  const encoded=encodeEntry(entry);
  const url=location.href.split('?')[0]+'?share='+encoded;
  if(navigator.share){
    navigator.share({title:'Embarque Liderança',text:'Frota '+entry.frota+' · '+entry.date,url}).catch(()=>{});
  } else if(navigator.clipboard){
    navigator.clipboard.writeText(url).then(()=>showToast('green','🔗','Link copiado!','Cole e compartilhe'));
  } else {
    prompt('Copie o link:',url);
  }
}

// ===== PDF IMPORT =====
const PDFJS_URL = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
const PDFJS_WORKER = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

async function loadPDFJS() {
  if (window.pdfjsLib) return;
  return new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = PDFJS_URL;
    s.onload = () => {
      window.pdfjsLib = window['pdfjs-dist/build/pdf'];
      window.pdfjsLib.GlobalWorkerOptions.workerSrc = PDFJS_WORKER;
      res();
    };
    s.onerror = rej;
    document.head.appendChild(s);
  });
}

function triggerPDFImport() {
  document.getElementById('pdfFileInput').value = '';
  document.getElementById('pdfFileInput').click();
}

async function handlePDFImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const btn = document.getElementById('btnImportPDF');
  btn.disabled = true;
  btn.textContent = '⏳ Lendo...';
  try {
    await loadPDFJS();
    const ab = await file.arrayBuffer();
    const pdfDoc = await window.pdfjsLib.getDocument({data: ab}).promise;
    let fullText = '';
    for (let i = 1; i <= pdfDoc.numPages; i++) {
      const page = await pdfDoc.getPage(i);
      const tc = await page.getTextContent();
      fullText += tc.items.map(x => x.str).join(' ') + '\n';
    }
    const result = parseManifest(fullText);
    const total = result.embarque.length + result.desembarque.length;
    if (!total) {
      showToast('red', '❌', 'Nenhum passageiro encontrado', 'Verifique se o PDF é o mapa de viagem correto');
    } else {
      showImportPreview(result);
    }
  } catch(err) {
    console.error(err);
    showToast('red', '❌', 'Erro ao ler PDF', 'Verifique se o arquivo é válido');
  }
  btn.disabled = false;
  btn.textContent = '📄 Importar PDF';
}

function parseManifest(rawText) {
  // Normalize: remove accents, collapse whitespace, uppercase
  const text = rawText
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/\s+/g, ' ')
    .toUpperCase().trim();

  const result = { hora: '', embarque: [], desembarque: [] };

  // Known cities (longest first)
  const CITIES = [
    'CONCEICAO DO ARAGUAIA','PARAISO DO TOCANTINS','ELDORADO DOS CARAJAS',
    'CANAA DOS CARAJAS','COUTO MAGALHAES','PARAUAPEBAS','CURIONOPOLIS',
    'XINGUARA','RIO MARIA','REDENCAO','PEQUIZEIRO','MIRANORTE','COLMEIA',
    'GUARAI','GURUPI','ALVORADA','PORANGATU','ANAPOLIS','SAPUCAIA',
    'RIALMA','JARAGUA','URUACU','GOIANIA'
  ].sort((a,b) => b.length - a.length);

  // 1. Extract departure time
  const horaM = text.match(/HORA\s*[:\s]+(\d{1,2}:\d{2})/);
  if (horaM) {
    const parts = horaM[1].split(':');
    result.hora = parts[0].padStart(2,'0') + ':' + parts[1];
  }

  // 2. Table boundary — stop before gratuidade / localidades tables
  const gratIdx = text.indexOf('RELACAO GRATUIDADE');
  const locIdx  = text.indexOf('LOCALIDADES AUTORIZADAS');
  const tableEnd = Math.min(
    gratIdx >= 0 ? gratIdx : text.length,
    locIdx  >= 0 ? locIdx  : text.length
  );
  const tableText = text.slice(0, tableEnd);

  // 3. Parse ALL rows including C1 children rows (do NOT skip duplicates)
  const rowRx = /(?<![0-9\/])(\d{1,2})(?![0-9\/])\s+([A-Z]{2,}(?:\s+[A-Z]{2,}){0,7}?)\s+(\d{6,11})(?!\d)/g;
  const SKIP_NAMES = ['MAPA DE VIAGEM','PASSAGEIRO','DOCUMENTO','CELULAR','DATA VENDA',
    'EMBARQUE','DESEMBARQUE','TIPO AGENCIA','RELACAO','LOCALIDADES','ITINERARIO',
    'PREFIXO','TIPO SERVICO','TOTAL DE'];

  const allRows = [];
  let m;
  while ((m = rowRx.exec(tableText)) !== null) {
    const seat = parseInt(m[1]);
    if (seat < 1 || seat > 54) continue;

    const rawName = m[2].trim();
    if (SKIP_NAMES.some(s => rawName.includes(s))) continue;
    if (rawName.split(' ').length > 8) continue;

    const afterDoc = tableText.slice(m.index + m[0].length, m.index + m[0].length + 800);
    const dateM = afterDoc.match(/\d{2}\/\d{2}\/\d{4}/);
    if (!dateM) continue;

    const afterDate = afterDoc.slice(dateM.index + 10).trim();

    // Embarque / desembarque cities
    let embarque = '', desembarque = '';
    const cityHits = [];
    for (const city of CITIES) {
      const pos = afterDate.indexOf(city);
      if (pos >= 0 && pos < 100) cityHits.push({ city, pos });
    }
    cityHits.sort((a,b) => a.pos - b.pos);
    if (cityHits.length >= 1) embarque = cityHits[0].city;
    if (cityHits.length >= 2 && cityHits[1].pos >= cityHits[0].pos + cityHits[0].city.length)
      desembarque = cityHits[1].city;

    // TIPO: 5-6 digit pass number followed by 2-3 char tipo code
    const passAndTipo = afterDate.match(/\b(\d{5,6})\s+([A-Z][A-Z0-9]{0,2})\b/);
    const tipo = passAndTipo ? passAndTipo[2] : '';

    // Agency: extract ONLY from the window between tipo code and end of this row.
    // The row ends where the next 1-2 digit seat number starts (next row) or at ~100 chars.
    // We anchor on the pass number + tipo already found, then look in the ~80 chars after tipo.
    let agency = '';
    if (passAndTipo) {
      const afterTipo = afterDate.slice(passAndTipo.index + passAndTipo[0].length, passAndTipo.index + passAndTipo[0].length + 100);
      if (afterTipo.includes('KEILA')) agency = 'KEILA';
      else if (afterTipo.match(/\bPH\b/) && afterTipo.includes('LIDERANC')) agency = 'PH';
    } else {
      // fallback: narrow 80-char window
      const agChunk = afterDate.slice(0, 80);
      if (agChunk.includes('KEILA')) agency = 'KEILA';
      else if (agChunk.match(/\bPH\b/) && agChunk.includes('LIDERANC')) agency = 'PH';
    }

    const name = rawName.split(' ').map(w =>
      w.length <= 2 ? w : w[0] + w.slice(1).toLowerCase()
    ).join(' ');

    allRows.push({ seat, name, tipo, embarque, desembarque, agency });
  }

  // 4. Group by seat — resolve C1 colo logic:
  //    If seat appears twice: one C1 row + one non-C1 row → child belongs to non-C1
  //    The C1 row itself is NOT a boarding passenger
  const seatGroups = {};
  allRows.forEach(row => {
    if (!seatGroups[row.seat]) seatGroups[row.seat] = [];
    seatGroups[row.seat].push(row);
  });

  const passengers = [];
  Object.values(seatGroups).forEach(rows => {
    const mainRows  = rows.filter(r => r.tipo !== 'C1');
    const childRows = rows.filter(r => r.tipo === 'C1');
    if (mainRows.length === 0) return; // only C1 → discard
    const main    = mainRows[0];
    const hasColo = childRows.length > 0;
    passengers.push({
      seat:        main.seat,
      name:        main.name,
      tipo:        main.tipo,
      cat:         main.seat > 46 ? 'leito' : '',
      agency:      main.agency,
      colo:        hasColo ? 1 : 0,
      embarque:    main.embarque,
      desembarque: main.desembarque,
      cidade:      ''
    });
  });

  // 5. Categorize into embarque / desembarque lists
  passengers.forEach(p => {
    if (p.embarque === 'CONCEICAO DO ARAGUAIA')
      result.embarque.push({ ...p });
    if (p.desembarque === 'CONCEICAO DO ARAGUAIA' && (p.agency === 'KEILA' || p.agency === 'PH'))
      result.desembarque.push({ ...p });
  });

  // 6. 08:30 rule: all CCA embarques included regardless of agency
  if (result.hora !== '08:30')
    result.embarque = result.embarque.filter(p => p.agency === 'KEILA' || p.agency === 'PH');

  result.embarque.sort((a,b) => a.seat - b.seat);
  result.desembarque.sort((a,b) => a.seat - b.seat);
  return result;
}

function showImportPreview(result) {
  const car = getActiveCar();

  const markExists = (arr) => arr.forEach(p => {
    p.exists = !!(car && car.passengers.find(x => String(x.seat) === String(p.seat)));
  });
  markExists(result.embarque);
  markExists(result.desembarque);

  const totalEmb = result.embarque.length;
  const totalDesemb = result.desembarque.length;

  const ov = document.createElement('div');
  ov.className = 'modal-overlay';
  ov.innerHTML = `
    <div class="modal-box" style="max-width:460px;text-align:left">
      <div style="text-align:center;margin-bottom:14px">
        <div class="modal-icon">📄</div>
        <div class="modal-title">Passageiros Encontrados</div>
        ${result.hora?`<div style="font-size:11px;color:var(--muted);margin-bottom:4px">⏰ Horário do manifesto: <strong style="color:var(--accent)">${result.hora}</strong></div>`:''}
        <div class="modal-desc" style="margin-bottom:0">${totalEmb} embarcando em Conceição · ${totalDesemb} desembarcando</div>
      </div>

      ${totalEmb>0?`
      <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">🚌 Embarcam em Conceição</div>
      <div class="import-preview-list">
        ${result.embarque.map((p, i) => `
          <div class="import-row ${p.exists?'skip':''}">
            <input type="checkbox" id="imp_emb_${i}" ${p.exists?'':'checked'} ${p.exists?'disabled':''}>
            <span class="import-seat">${p.seat}</span>
            <span style="font-size:12px;font-weight:600;flex:1">${p.name||''}</span>
            ${p.agency?`<span class="tag ${p.agency.toLowerCase()}" style="font-size:10px">${p.agency}</span>`:''}
            ${p.cat==='leito'?'<span class="tag leito" style="font-size:10px">Leito</span>':'<span class="tag comum" style="font-size:10px">Comum</span>'}
            ${p.colo>0?'<span class="tag" style="color:var(--yellow);background:rgba(212,144,10,.1);font-size:10px">👶</span>':''}
            ${p.exists?'<span style="font-size:10px;color:var(--muted)">já existe</span>':`
            <div class="outra-cidade-toggle" style="margin-left:auto" onclick="event.stopPropagation();toggleOcImport(${i})">
              <div class="oc-check" id="oc_imp_${i}"></div>
              <span class="oc-label" style="font-size:10px">Outra cidade</span>
            </div>`}
          </div>`).join('')}
      </div>`:''}

      ${totalDesemb>0?`
      <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:10px 0 6px">🏁 Desembarcam em Conceição (${result.hora!=='08:30'?'KEILA/PH':'todos'})</div>
      <div class="import-preview-list" style="max-height:120px">
        ${result.desembarque.map((p, i) => `
          <div class="import-row">
            <span class="import-seat">${p.seat}</span>
            <span style="font-size:12px;font-weight:600;flex:1">${p.name||''}</span>
            ${p.agency?`<span class="tag ${p.agency.toLowerCase()}" style="font-size:10px">${p.agency}</span>`:''}
            <span style="font-size:10px;color:var(--muted)">↓ CCA</span>
          </div>`).join('')}
      </div>
      <div style="font-size:10px;color:var(--muted);margin-bottom:8px">ℹ️ Estes serão salvos no histórico do embarque.</div>`:''}

      <div class="modal-btns">
        <button class="mbtn-cancel" onclick="this.closest('.modal-overlay').remove()">Cancelar</button>
        <button class="mbtn-confirm-green" onclick="confirmImport(this)">✔ Adicionar Selecionados</button>
      </div>
    </div>`;

  ov._importData = result;
  document.body.appendChild(ov);
  ov.addEventListener('click', e => { if (e.target === ov) ov.remove(); });
}

const _ocImportState = {};
function toggleOcImport(i){
  _ocImportState[i] = !_ocImportState[i];
  const el = document.getElementById('oc_imp_' + i);
  if (el) el.className = 'oc-check' + (_ocImportState[i] ? ' checked' : '');
}

function confirmImport(btn) {
  const ov = btn.closest('.modal-overlay');
  const result = ov._importData;
  const car = getActiveCar();
  if (!car) { showToast('red','⚠️','Nenhum carro','Selecione um carro primeiro'); ov.remove(); return; }

  let added = 0;
  result.embarque.forEach((p, i) => {
    const cb = document.getElementById('imp_emb_' + i);
    if (!cb || !cb.checked || p.exists) return;
    if (car.passengers.find(x => String(x.seat) === String(p.seat))) return;
    car.passengers.push({
      id: nextPassId++,
      seat: p.seat,
      name: p.name || '',
      cat: p.cat || '',
      agency: p.agency,
      colo: p.colo || 0,
      cidade: _ocImportState[i] ? 'Outra cidade' : '',
      status: 'waiting',
      time: null
    });
    added++;
  });
  // Clear state
  Object.keys(_ocImportState).forEach(k => delete _ocImportState[k]);

  // Save desembarque passengers to car metadata
  car.desembCca = result.desembarque.map(p => ({ seat:p.seat, name:p.name||'', agency:p.agency||'' }));

  saveCars(); refresh();
  ov.remove();
  if (added > 0) showToast('green', '✅', `${added} passageiro${added!==1?'s':''} adicionado${added!==1?'s':''}!`, 'Importados do PDF');
  else showToast('blue', 'ℹ️', 'Nenhum novo passageiro', 'Todos já estavam na lista');
  if ((car.desembCca||[]).length > 0) showToast('blue','🏁',`${car.desembCca.length} desembarcando em CCA`,'Será mostrado no histórico ao finalizar');
}


if(!loadCarsData()){saveCars();}
refresh();renderHistory();
// set defaults
selectAgency('KEILA');
selectCat('');
</script>
